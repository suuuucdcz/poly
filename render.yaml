# Blueprint Render (plan gratuit) + persistance via Supabase Storage.
# Région Frankfurt (EU) pour éviter le géo-blocage de Binance.
services:
  - type: web
    name: polyquant
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Secrets à renseigner dans le dashboard Render (Environment) :
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: polyquant
